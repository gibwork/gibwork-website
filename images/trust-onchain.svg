<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Roboto:wght@400;500&amp;display=swap');
    </style>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f9d58;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f9d58;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#202124" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="#ffffff"/>

  <!-- Subtle background pattern -->
  <g opacity="0.03">
    <circle cx="50" cy="50" r="80" fill="#1a73e8"/>
    <circle cx="350" cy="350" r="100" fill="#34a853"/>
    <circle cx="200" cy="200" r="150" fill="#fbbc04"/>
  </g>

  <!-- Shield / Trust Icon -->
  <g filter="url(#shadow)">
    <path d="M200 60 L310 100 L310 200 C310 280 260 340 200 360 C140 340 90 280 90 200 L90 100 Z" 
          fill="url(#shieldGrad)" stroke="#1a73e8" stroke-width="2"/>
    <!-- Inner shield highlight -->
    <path d="M200 80 L290 112 L290 200 C290 268 248 322 200 340 C152 322 110 268 110 200 L110 112 Z" 
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  </g>

  <!-- Checkmark inside shield -->
  <g filter="url(#glow)">
    <path d="M170 200 L192 222 L232 178" 
          fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Chain links (left side) -->
  <g transform="translate(85, 160)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="none" stroke="#1a73e8" stroke-width="2.5" transform="rotate(-30)"/>
    <ellipse cx="18" cy="-10" rx="12" ry="8" fill="none" stroke="#1a73e8" stroke-width="2.5" transform="rotate(-30)"/>
    <ellipse cx="36" cy="-20" rx="12" ry="8" fill="none" stroke="#1a73e8" stroke-width="2.5" transform="rotate(-30)"/>
  </g>

  <!-- Chain links (right side) -->
  <g transform="translate(295, 160)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="none" stroke="#34a853" stroke-width="2.5" transform="rotate(30)"/>
    <ellipse cx="-18" cy="-10" rx="12" ry="8" fill="none" stroke="#34a853" stroke-width="2.5" transform="rotate(30)"/>
    <ellipse cx="-36" cy="-20" rx="12" ry="8" fill="none" stroke="#34a853" stroke-width="2.5" transform="rotate(30)"/>
  </g>

  <!-- Decorative dots around shield -->
  <circle cx="200" cy="50" r="3" fill="#fbbc04" opacity="0.7"/>
  <circle cx="240" cy="55" r="2" fill="#34a853" opacity="0.5"/>
  <circle cx="160" cy="55" r="2" fill="#1a73e8" opacity="0.5"/>
  <circle cx="130" cy="75" r="2.5" fill="#fbbc04" opacity="0.6"/>
  <circle cx="270" cy="75" r="2.5" fill="#34a853" opacity="0.6"/>

  <!-- Bottom decorative elements -->
  <g transform="translate(200, 380)">
    <rect x="-60" y="-3" width="120" height="6" rx="3" fill="#dadce0" opacity="0.5"/>
  </g>

  <!-- Small sparkle/star accents -->
  <g opacity="0.8">
    <polygon points="320,90 322,96 328,96 323,100 325,106 320,102 315,106 317,100 312,96 318,96" fill="#fbbc04"/>
    <polygon points="75,280 77,286 83,286 78,290 80,296 75,292 70,296 72,290 67,286 73,286" fill="#34a853"/>
    <polygon points="340,250 342,254 346,254 343,257 344,261 340,258 336,261 337,257 334,254 338,254" fill="#1a73e8"/>
  </g>

  <!-- Label text -->
  <text x="200" y="130" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#ffffff" opacity="0.9" letter-spacing="1">ON-CHAIN</text>
  <text x="200" y="145" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#ffffff" opacity="0.75" letter-spacing="0.5">VERIFIED</text>

  <!-- Bottom text -->
  <text x="200" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#202124">Trusted &amp; Transparent</text>
  <text x="200" y="388" text-anchor="middle" font-family="Roboto, sans-serif" font-size="10" fill="#5f6368">Every reward is on-chain verified</text>
</svg>