<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0F0F1A;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="clipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6C63FF" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="38" fill="url(#bgGrad)" stroke="rgba(108,99,255,0.2)" stroke-width="1.5"/>

  <!-- Clipboard body -->
  <g filter="url(#shadow)">
    <!-- Clipboard base -->
    <rect x="20" y="22" width="40" height="46" rx="4" ry="4" fill="#1A1A2E" stroke="url(#clipGrad)" stroke-width="1.5"/>

    <!-- Clipboard top clip -->
    <rect x="30" y="18" width="20" height="8" rx="3" ry="3" fill="#1A1A2E" stroke="url(#clipGrad)" stroke-width="1.5"/>
    <rect x="33" y="20" width="14" height="4" rx="2" ry="2" fill="none" stroke="url(#clipGrad)" stroke-width="1"/>

    <!-- Paper lines -->
    <line x1="28" y1="34" x2="52" y2="34" stroke="#B0B0C0" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="28" y1="40" x2="52" y2="40" stroke="#B0B0C0" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="28" y1="46" x2="52" y2="46" stroke="#B0B0C0" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
    <line x1="28" y1="52" x2="44" y2="52" stroke="#B0B0C0" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Checkmark -->
  <g filter="url(#glow)">
    <circle cx="52" cy="54" r="12" fill="rgba(0,212,170,0.15)" stroke="url(#checkGrad)" stroke-width="1.5"/>
    <polyline points="46,54 50,58 58,50" fill="none" stroke="url(#checkGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Subtle decorative dots -->
  <circle cx="24" cy="62" r="1" fill="#6C63FF" opacity="0.3"/>
  <circle cx="56" cy="28" r="1" fill="#00D4AA" opacity="0.3"/>
  <circle cx="28" cy="28" r="0.8" fill="#FF6584" opacity="0.2"/>
</svg>