<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Roboto:wght@400;500&amp;display=swap');
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fe;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f0f9ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34a853;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f9d58;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#1a73e8" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="120" cy="120" r="118" fill="url(#bgGrad)" stroke="#dadce0" stroke-width="2"/>

  <!-- Shield shape -->
  <g filter="url(#shadow)">
    <path d="M120 40 L175 65 L175 115 C175 150 150 180 120 195 C90 180 65 150 65 115 L65 65 Z" 
          fill="url(#shieldGrad)" 
          stroke="#1a73e8" 
          stroke-width="1.5"
          stroke-linejoin="round"/>
  </g>

  <!-- Checkmark inside shield -->
  <g filter="url(#glow)">
    <path d="M100 120 L115 138 L142 105" 
          fill="none" 
          stroke="url(#checkGrad)" 
          stroke-width="6" 
          stroke-linecap="round" 
          stroke-linejoin="round"/>
  </g>

  <!-- Decorative dots - representing global talent -->
  <circle cx="70" cy="70" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="170" cy="70" r="3" fill="#1a73e8" opacity="0.3"/>
  <circle cx="60" cy="140" r="2.5" fill="#34a853" opacity="0.25"/>
  <circle cx="180" cy="140" r="2.5" fill="#34a853" opacity="0.25"/>
  <circle cx="75" cy="175" r="2" fill="#fbbc04" opacity="0.3"/>
  <circle cx="165" cy="175" r="2" fill="#fbbc04" opacity="0.3"/>
  <circle cx="120" cy="50" r="2.5" fill="#1a73e8" opacity="0.2"/>
  <circle cx="120" cy="210" r="2.5" fill="#1a73e8" opacity="0.2"/>

  <!-- Small connecting lines - representing open contribution -->
  <line x1="73" y1="70" x2="117" y2="55" stroke="#1a73e8" stroke-width="0.8" opacity="0.15"/>
  <line x1="167" y1="70" x2="123" y2="55" stroke="#1a73e8" stroke-width="0.8" opacity="0.15"/>
  <line x1="62" y1="140" x2="95" y2="155" stroke="#34a853" stroke-width="0.8" opacity="0.15"/>
  <line x1="178" y1="140" x2="145" y2="155" stroke="#34a853" stroke-width="0.8" opacity="0.15"/>

  <!-- Ring arc - representing on-chain transparency -->
  <path d="M120 30 A90 90 0 0 1 195 100" 
        fill="none" 
        stroke="#1a73e8" 
        stroke-width="1.5" 
        stroke-dasharray="4 6" 
        opacity="0.3"/>
  <path d="M120 30 A90 90 0 0 0 45 100" 
        fill="none" 
        stroke="#34a853" 
        stroke-width="1.5" 
        stroke-dasharray="4 6" 
        opacity="0.3"/>

  <!-- Bottom text label -->
  <text x="120" y="228" 
        font-family="Inter, sans-serif" 
        font-size="11" 
        font-weight="600" 
        fill="#5f6368" 
        text-anchor="middle" 
        letter-spacing="1.5">
    OPEN CONTRIBUTION
  </text>

  <!-- Small badge accent - top right -->
  <circle cx="165" cy="55" r="8" fill="#fbbc04" opacity="0.9"/>
  <text x="165" y="58" 
        font-family="Inter, sans-serif" 
        font-size="8" 
        font-weight="700" 
        fill="#202124" 
        text-anchor="middle">
    ✓
  </text>
</svg>