<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#162240"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFAA"/>
      <stop offset="100%" stop-color="#00CC88"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFAA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00FFAA" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring glow -->
  <circle cx="40" cy="40" r="36" fill="none" stroke="url(#ringGrad)" stroke-width="6"/>

  <!-- Background circle -->
  <circle cx="40" cy="40" r="32" fill="url(#bgGrad)" stroke="#00FFAA" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Solana diamond outline -->
  <polygon points="40,12 58,40 40,68 22,40" fill="none" stroke="#00FFAA" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Lightning bolt for "instant" -->
  <g filter="url(#glow)">
    <polygon points="42,24 30,42 38,42 34,58 50,38 42,38 48,24" fill="url(#boltGrad)" stroke="none"/>
  </g>

  <!-- Small coin/dot accents -->
  <circle cx="22" cy="38" r="2" fill="#00FFAA" opacity="0.6"/>
  <circle cx="58" cy="38" r="2" fill="#00FFAA" opacity="0.6"/>
  <circle cx="40" cy="16" r="1.5" fill="#00FFAA" opacity="0.4"/>
  <circle cx="40" cy="64" r="1.5" fill="#00FFAA" opacity="0.4"/>

  <!-- Subtle inner shimmer lines -->
  <line x1="30" y1="30" x2="34" y2="34" stroke="#00FFAA" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="30" x2="46" y2="34" stroke="#00FFAA" stroke-width="0.5" opacity="0.3"/>
</svg>