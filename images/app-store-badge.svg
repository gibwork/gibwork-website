svg
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 120 40" width="120" height="40" role="img" aria-labelledby="appStoreTitle appStoreDesc" preserveAspectRatio="xMidYMid meet" lang="en">
  <!--
    Accessibility and SEO: Title and description
    - title: concise description of the button action
    - desc: longer explanation for screen readers
    These are referenced by aria-labelledby for robust accessibility.
  -->
  <title id="appStoreTitle">Download on the App Store</title>
  <desc id="appStoreDesc">Gibwork mobile app download badge – tap to install from Apple App Store</desc>

  <defs>
    <!--
      Performance-first CSS: minimal classes, no unnecessary resets.
      - badage-bg: dark rect background (Apple style)
      - badge‑text: main typography using system fonts for crispness
      - badge‑sub: lighter / smaller subtitle
      - icon‑white: shared fill for Apple logo
      Font stack includes widely available system fonts; no external loads.
    -->
    <style>
      .badge-bg { fill: #000000; }
      .badge-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; fill: #FFFFFF; font-size: 9px; font-weight: 600; }
      .badge-sub { font-size: 3.5px; font-weight: 400; }
      .icon-white { fill: #FFFFFF; }
    </style>
  </defs>

  <!--
    Badge background (rounded rectangle, public‑facing button look)
    Uses exact Apple-like dimensions: width 120, height 40, radius 6.
  -->
  <rect width="120" height="40" rx="6" class="badge-bg" />

  <!--
    Apple logo – vectorised, minified path with no redundant curves.
    Transformed to position correctly inside the badge.
    aria-hidden because the logo is decorative; text describes the action.
    The path is the standard Apple icon simplified for accessibility.
  -->
  <g transform="translate(10, 7) scale(0.9)" class="icon-white" aria-hidden="true">
    <path d="M17.29 9.48c-0.11 0.91-0.66 1.73-1.26 2.36-0.64 0.68-1.28 1.33-2.22 1.33-0.9 0-1.38-0.52-2.54-0.52-1.19 0-1.71 0.53-2.52 0.53-0.92 0-1.57-0.67-2.22-1.35C5.59 11.3 5 9.81 5 8.28c0-2.31 1.39-4.29 3.54-4.29 0.9 0 1.68 0.35 2.27 0.35 0.58 0 1.37-0.37 2.43-0.37 0.82 0 1.67 0.33 2.26 0.91C14.96 5.51 15.22 6.36 15.22 7.2c0 0.12-0.01 0.25-0.03 0.37h-0.01c-1.46 0-2.67 1.14-2.67 2.67 0 1.57 1.23 2.72 2.78 2.72 0.35 0 0.68-0.05 1-0.15v-0.01zM13.96 6.52c0 0.11-0.01 0.22-0.02 0.33H13.93c-0.27 0-0.55-0.1-0.74-0.28C12.98 6.38 12.88 6.1 12.88 5.84c0-0.15 0.03-0.3 0.09-0.44h0.01c0.17-0.03 0.34-0.05 0.52-0.05 0.27 0 0.52 0.1 0.70 0.28 0.19 0.19 0.30 0.46 0.30 0.74z" />
  </g>

  <!--
    Text group – two lines:
    - "Download on the" (subtitle)
    - "App Store" (primary CTA, larger and bolder)
    Physical offsets respect Apple’s human interface guidelines.
    Explicit x and y values avoid baseline misalignment.
  -->
  <g transform="translate(32, 12)" class="badge-text">
    <!-- Subtitle line: small, light weight -->
    <text x="0" y="0" class="badge-sub">Download on the</text>
    <!-- Main call-to-action: larger, bold weight -->
    <text x="0" y="16" font-size="13" font-weight="700" letter-spacing="0.03em">App Store</text>
  </g>

  <!--
    Fallback for very old browsers: embed a visible alt text using foreignObject? Not used to keep SVG clean.
    Instead, the title and desc provide full accessibility.
  -->
</svg>