<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" width="180" height="60">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="apple-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge background -->
  <rect x="0" y="0" width="180" height="60" rx="8" ry="8" fill="url(#bg-gradient)" stroke="rgba(108,99,255,0.3)" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Apple icon -->
  <g transform="translate(14, 15)" filter="url(#glow)">
    <!-- Apple body -->
    <path d="M22.5 4.5c-1.2 0-2.7 0.7-3.5 1.8-0.8 1.1-1.2 2.6-1 4.1 1.3 0.1 2.6-0.7 3.4-1.8 0.8-1.1 1.2-2.6 1.1-4.1z" fill="#fff"/>
    <path d="M24.8 7.2c-1.8-0.1-3.3 1-4.1 2.6-0.8 1.6-0.8 3.5 0 5.1 0.8 1.6 2.3 2.7 4.1 2.6 1.8 0 3.3-1 4.1-2.6 0.8-1.6 0.8-3.5 0-5.1-0.8-1.6-2.3-2.6-4.1-2.6z" fill="#fff"/>
    <!-- Apple leaf -->
    <path d="M22.5 4.5c0.1-0.3 0.3-0.6 0.6-0.8 0.3-0.2 0.6-0.3 1-0.3" fill="none" stroke="#fff" stroke-width="0.8" stroke-linecap="round"/>
  </g>

  <!-- Text content -->
  <g transform="translate(42, 12)">
    <!-- "Download on the" text -->
    <text x="0" y="10" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="7" font-weight="400" fill="#B0B0C0" letter-spacing="0.5">Download on the</text>

    <!-- "App Store" text -->
    <text x="0" y="28" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="700" fill="#fff" letter-spacing="0.3">App Store</text>

    <!-- Decorative line -->
    <line x1="0" y1="34" x2="95" y2="34" stroke="url(#apple-gradient)" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Subtle border glow on hover -->
  <rect x="0" y="0" width="180" height="60" rx="8" ry="8" fill="none" stroke="url(#apple-gradient)" stroke-width="0" opacity="0">
    <animate attributeName="stroke-width" values="0;1.5;0" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>