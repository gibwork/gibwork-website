<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1A2E"/>
      <stop offset="100%" stop-color="#1A2A45"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00FFAA"/>
      <stop offset="100%" stop-color="#00CC88"/>
    </linearGradient>
  </defs>

  <!-- Telefon -->
  <rect x="14" y="8" width="36" height="52" rx="6" ry="6" fill="url(#bgGrad)" stroke="#00FFAA" stroke-width="2"/>
  <!-- Ekran -->
  <rect x="18" y="14" width="28" height="38" rx="2" ry="2" fill="#0F1A2E"/>
  <!-- Przycisk home -->
  <circle cx="32" cy="56" r="2" fill="#00FFAA"/>

  <!-- Ikona wysyłania (submit) na ekranie -->
  <g transform="translate(32, 33)" fill="url(#accentGrad)">
    <!-- Strzałka w górę -->
    <path d="M0,-8 L-6,2 L6,2 Z" />
    <!-- Linia pozioma -->
    <rect x="-8" y="2" width="16" height="2" rx="1" />
  </g>

  <!-- Fala sygnału u góry telefonu -->
  <path d="M20 12 Q24 8 24 12" stroke="#00FFAA" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M22 10 Q28 6 28 12" stroke="#00FFAA" stroke-width="1.5" fill="none" opacity="0.4"/>
</svg>