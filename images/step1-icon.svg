<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="avatarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#6C63FF" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="60" cy="48" r="32"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="url(#bgGrad)" stroke="rgba(108,99,255,0.2)" stroke-width="1.5"/>

  <!-- Avatar circle background -->
  <circle cx="60" cy="48" r="34" fill="#1A1A2E" stroke="rgba(108,99,255,0.3)" stroke-width="2"/>

  <!-- Avatar head -->
  <circle cx="60" cy="40" r="14" fill="url(#avatarGrad)" opacity="0.9"/>

  <!-- Avatar body/shoulders -->
  <ellipse cx="60" cy="74" rx="22" ry="16" fill="url(#avatarGrad)" opacity="0.7"/>

  <!-- Checkmark circle background -->
  <circle cx="82" cy="82" r="18" fill="#1A1A2E" stroke="url(#checkGrad)" stroke-width="2.5" filter="url(#shadow)"/>

  <!-- Checkmark -->
  <path d="M74 82 L80 88 L90 76" 
        fill="none" 
        stroke="url(#checkGrad)" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#glow)"/>

  <!-- Subtle decorative dots -->
  <circle cx="30" cy="30" r="1.5" fill="#6C63FF" opacity="0.4"/>
  <circle cx="92" cy="28" r="1" fill="#00D4AA" opacity="0.3"/>
  <circle cx="28" cy="80" r="1" fill="#00D4AA" opacity="0.3"/>
  <circle cx="100" cy="50" r="1.2" fill="#6C63FF" opacity="0.25"/>
</svg>