<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 646 250" width="646" height="250">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0.2" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6C63FF" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="badgeClip">
      <rect x="0" y="0" width="646" height="250" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="646" height="250" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle border -->
  <rect x="1" y="1" width="644" height="248" rx="15" fill="none" stroke="url(#badgeGrad)" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Glow effect behind badge -->
  <ellipse cx="140" cy="125" rx="120" ry="100" fill="url(#playGrad)" filter="url(#glow)"/>

  <!-- Play Store Icon -->
  <g transform="translate(40, 40)">
    <!-- Play Store polygon icon -->
    <polygon points="0,0 0,170 150,85" fill="#6C63FF" opacity="0.9"/>
    <polygon points="0,0 0,170 150,85" fill="url(#badgeGrad)" opacity="0.8"/>
    <!-- Inner triangle highlight -->
    <polygon points="20,15 20,155 130,85" fill="#FFFFFF" opacity="0.15"/>
  </g>

  <!-- Text: GET IT ON -->
  <text x="210" y="85" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="14" font-weight="500" letter-spacing="3" fill="#B0B0C0">GET IT ON</text>

  <!-- Text: Google Play -->
  <text x="210" y="130" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#FFFFFF" letter-spacing="1">Google Play</text>

  <!-- Decorative line under Google Play -->
  <line x1="210" y1="145" x2="420" y2="145" stroke="url(#badgeGrad)" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Rating stars -->
  <g transform="translate(210, 160)">
    <text font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="13" fill="#B0B0C0" font-weight="400">
      4.8
    </text>
    <!-- Star 1 -->
    <polygon points="55,5 58,14 68,14 60,20 63,29 55,24 47,29 50,20 42,14 52,14" fill="#FFC107"/>
    <!-- Star 2 -->
    <polygon points="75,5 78,14 88,14 80,20 83,29 75,24 67,29 70,20 62,14 72,14" fill="#FFC107"/>
    <!-- Star 3 -->
    <polygon points="95,5 98,14 108,14 100,20 103,29 95,24 87,29 90,20 82,14 92,14" fill="#FFC107"/>
    <!-- Star 4 -->
    <polygon points="115,5 118,14 128,14 120,20 123,29 115,24 107,29 110,20 102,14 112,14" fill="#FFC107"/>
    <!-- Star 5 (half) -->
    <polygon points="135,5 138,14 148,14 140,20 143,29 135,24 127,29 130,20 122,14 132,14" fill="#FFC107" opacity="0.4"/>
    <polygon points="135,5 138,14 148,14 140,20 143,29 135,24 135,5" fill="#FFC107"/>
    <text x="155" y="24" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11" fill="#B0B0C0" font-weight="400">
      ★
    </text>
  </g>

  <!-- Free tag -->
  <rect x="210" y="190" width="80" height="28" rx="14" fill="none" stroke="#00D4AA" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="250" y="209" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#00D4AA" text-anchor="middle">FREE</text>

  <!-- Download count -->
  <text x="310" y="209" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="12" fill="#B0B0C0" font-weight="400">
    10M+ Downloads
  </text>

  <!-- QR Code placeholder -->
  <g transform="translate(500, 40)">
    <rect x="0" y="0" width="80" height="80" rx="8" fill="#1A1A2E" stroke="url(#badgeGrad)" stroke-width="1" stroke-opacity="0.4"/>
    <!-- QR pattern -->
    <rect x="8" y="8" width="16" height="16" rx="2" fill="#6C63FF" opacity="0.8"/>
    <rect x="56" y="8" width="16" height="16" rx="2" fill="#6C63FF" opacity="0.8"/>
    <rect x="8" y="56" width="16" height="16" rx="2" fill="#6C63FF" opacity="0.8"/>
    <rect x="32" y="32" width="8" height="8" rx="1" fill="#6C63FF" opacity="0.6"/>
    <rect x="48" y="32" width="8" height="8" rx="1" fill="#6C63FF" opacity="0.6"/>
    <rect x="32" y="48" width="8" height="8" rx="1" fill="#6C63FF" opacity="0.6"/>
    <rect x="48" y="48" width="8" height="8" rx="1" fill="#6C63FF" opacity="0.6"/>
    <rect x="24" y="20" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="36" y="20" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="24" y="28" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="52" y="20" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="60" y="28" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="20" y="44" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="60" y="44" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="20" y="52" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="44" y="56" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="52" y="56" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="28" y="60" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="36" y="60" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <rect x="44" y="60" width="4" height="4" rx="1" fill="#00D4AA" opacity="0.5"/>
    <!-- Scan text -->
    <text x="40" y="95" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="9" fill="#B0B0C0" text-anchor="middle" font-weight="400">SCAN ME</text>
  </g>

  <!-- Bottom decorative gradient line -->
  <rect x="0" y="248" width="646" height="2" rx="1" fill="url(#badgeGrad)" opacity="0.4"/>
</svg>