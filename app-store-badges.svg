// ---------------------------------------------------------------------------
// Logging Service
// ---------------------------------------------------------------------------

/**
 * Minimal logging wrapper with environment‑aware control.
 * Errors are always logged; info and warn are suppressed in production.
 * @internal
 */
class Logger {
  private readonly prefix: string;

  constructor(prefix: string) {
    this.prefix = `[${prefix}]`;
  }

  /**
   * Log an info message (development only).
   * @param message - Log message.
   * @param args - Additional arguments.
   */
  info(message: string, ...args: unknown[]): void {
    if (process.env.NODE_ENV !== 'production') {
      // eslint-disable-next-line no-console
      console.info(`${this.prefix} ${message}`, ...args);
    }
  }

  /**
   * Log a warning message (development only).
   * @param message - Log message.
   * @param args - Additional arguments.
   */
  warn(message: string, ...args: unknown[]): void {
    if (process.env.NODE_ENV !== 'production') {
      // eslint-disable-next-line no-console
      console.warn(`${this.prefix} ${message}`, ...args);
    }
  }

  /**
   * Log an error message (always logged).
   * @param message - Log message.
   * @param args - Additional arguments.
   */
  error(message: string, ...args: unknown[]): void {
    // Always log errors
    // eslint-disable-next-line no-console
    console.error(`${this.prefix} ${message}`, ...args);
  }
}

const log = new Logger(COMPONENT_NAME);

// ---------------------------------------------------------------------------
// Props & Types
// ---------------------------------------------------------------------------

/**
 * Props for the `StoreBadge` component.
 */
export interface StoreBadgeProps {
  /** Badge type: 'apple' or 'google'. */
  type: AllowedType;
  /** Localized "Available in" text (defaults to Polish). */
  availableText?: string;
  /** Localized store name (e.g. "App Store", "Google Play"). */
  storeName?: string;
  /** Width of the badge (default 280). */
  width?: number;
  /** Height of the badge (default 60). */
  height?: number;
  /** Additional CSS class for external styling. */
  className?: string;
}

